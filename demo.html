<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* ===== LOADER SCREEN ===== */
    .loader-screen {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loader-screen.done {
      opacity: 0;
      visibility: hidden;
    }

    /* Subtle grid */
    .loader-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: min(90vw, 600px);
      position: relative;
    }

    /* ===== TRACK ===== */
    .track-area {
      width: 100%;
      height: 120px;
      position: relative;
      display: flex;
      align-items: flex-end;
    }

    .track-surface {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #161625;
      border-radius: 50px;
      overflow: hidden;
    }

    .track-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0d9488, #14b8a6);
      border-radius: 50px;
      box-shadow: 0 0 12px rgba(13, 148, 136, 0.4);
      transition: none;
    }

    /* Finish marker */
    .finish-marker {
      position: absolute;
      right: 0;
      bottom: -12px;
      width: 3px;
      height: 26px;
      background: repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.6) 0px,
        rgba(255,255,255,0.6) 3px,
        rgba(50,50,50,0.6) 3px,
        rgba(50,50,50,0.6) 6px
      );
      border-radius: 1px;
    }

    /* ===== RACE GROUP (car + driver move together) ===== */
    .race-group {
      position: absolute;
      bottom: 5px;
      left: 0%;
      display: flex;
      align-items: flex-end;
      /* Front of car leads at the progress point */
      transform: translateX(-100%);
    }

    /* ===== F1 CAR ===== */
    .f1-car {
      height: 50px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      display: block;
    }

    /* ===== DRIVER ===== */
    .driver {
      height: 62px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
      margin-right: -10px; /* slight overlap so hands touch car */
    }

    .driver.visible {
      opacity: 1;
    }

    /* ===== CAR STALL ===== */
    @keyframes car-stall {
      0%   { transform: translateX(-100%) rotate(0deg); }
      10%  { transform: translateX(-98%) rotate(0.3deg); }
      20%  { transform: translateX(-102%) rotate(-0.3deg); }
      30%  { transform: translateX(-99%) rotate(0.2deg); }
      40%  { transform: translateX(-101%) rotate(-0.2deg); }
      50%  { transform: translateX(-100%) rotate(0.1deg); }
      60%  { transform: translateX(-99.5%) rotate(-0.1deg); }
      80%  { transform: translateX(-100%) rotate(0deg); }
      100% { transform: translateX(-100%) rotate(0deg); }
    }

    .race-group.stuck {
      animation: car-stall 0.7s ease-out;
    }

    /* ===== DRIVER PUSH ===== */
    @keyframes push-cycle {
      0%, 100% { margin-right: -10px; }
      40% { margin-right: -6px; }
      60% { margin-right: -10px; }
    }

    .driver.pushing {
      animation: push-cycle 0.4s ease-in-out infinite;
    }

    /* ===== SMOKE PARTICLES ===== */
    .particle {
      position: absolute;
      bottom: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,100,100,0.5), transparent);
      opacity: 0;
      pointer-events: none;
    }

    @keyframes particle-rise {
      0% { opacity: 0.6; transform: scale(1) translate(0, 0); }
      50% { opacity: 0.3; transform: scale(1.8) translate(-8px, -12px); }
      100% { opacity: 0; transform: scale(2.5) translate(-16px, -20px); }
    }

    .particle.active {
      animation: particle-rise 0.8s ease-out forwards;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      color: #0d9488;
      font-size: 11px;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.3s ease;
      min-height: 16px;
    }

    .status-text.visible {
      opacity: 0.8;
    }

    .percent-text {
      font-family: 'JetBrains Mono', monospace;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      opacity: 0.4;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    /* ===== SKIP HINT ===== */
    .skip-hint {
      position: absolute;
      bottom: -50px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #fff;
      opacity: 0;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .skip-hint.visible {
      opacity: 0.2;
    }

    .skip-hint:hover {
      opacity: 0.5;
    }

    /* ===== PAGE CONTENT ===== */
    .page-content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }

    .page-content h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
    }

    .page-content p {
      opacity: 0.5;
      margin-top: 10px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .f1-car { height: 35px; }
      .driver { height: 45px; }
      .track-area { height: 80px; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader-screen" id="loaderScreen">
    <div class="loader-container">
      <div class="track-area" id="trackArea">
        <div class="track-surface">
          <div class="track-progress" id="trackProgress"></div>
        </div>
        <div class="finish-marker"></div>

        <!-- CAR + DRIVER grouped together -->
        <div class="race-group" id="raceGroup">
          <img class="driver" id="driver" src="driver.png" alt="" draggable="false"/>
          <img class="f1-car" id="f1Car" src="f1-car.png" alt="" draggable="false"/>
        </div>

        <!-- Smoke particles -->
        <div class="particle" id="p1"></div>
        <div class="particle" id="p2"></div>
        <div class="particle" id="p3"></div>
        <div class="particle" id="p4"></div>
        <div class="particle" id="p5"></div>
      </div>

      <div class="status-bar">
        <span class="status-text" id="statusText"></span>
        <span class="percent-text" id="percentText">0%</span>
      </div>

      <span class="skip-hint" id="skipHint" onclick="skipLoader()">click to skip</span>
    </div>
  </div>

  <!-- YOUR PORTFOLIO -->
  <div class="page-content">
    <div>
      <h1>Hey, I'm [Your Name]</h1>
      <p>I push things across the finish line.</p>
    </div>
  </div>

  <script>
    // === ELEMENTS ===
    const trackProgress = document.getElementById('trackProgress');
    const percentText = document.getElementById('percentText');
    const f1Car = document.getElementById('f1Car');
    const driver = document.getElementById('driver');
    const raceGroup = document.getElementById('raceGroup');
    const screen = document.getElementById('loaderScreen');
    const statusText = document.getElementById('statusText');
    const trackArea = document.getElementById('trackArea');
    const skipHint = document.getElementById('skipHint');
    const particles = [
      document.getElementById('p1'),
      document.getElementById('p2'),
      document.getElementById('p3'),
      document.getElementById('p4'),
      document.getElementById('p5')
    ];

    // === CONFIG ===
    const STUCK_AT = 62;
    const PHASE1_DURATION = 850;
    const STUCK_DURATION = 750;
    const ENTRY_DELAY = 300;
    const PUSH_DURATION = 850;
    const EXIT_DELAY = 400;

    // === FIRST VISIT CHECK ===
    const hasVisited = localStorage.getItem('portfolio_visited');
    if (hasVisited) {
      // Uncomment to skip for returning visitors:
      // screen.classList.add('done');
    }
    localStorage.setItem('portfolio_visited', 'true');

    // === UTILITIES ===
    let currentProgress = 0;

    function setProgress(val) {
      currentProgress = val;
      trackProgress.style.width = val + '%';
      percentText.textContent = Math.round(val) + '%';
      raceGroup.style.left = val + '%';
    }

    function showStatus(text) {
      statusText.textContent = text;
      statusText.classList.add('visible');
    }

    function hideStatus() {
      statusText.classList.remove('visible');
    }

    function typeStatus(text, speed = 40) {
      statusText.textContent = '';
      statusText.classList.add('visible');
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          statusText.textContent += text[i];
          i++;
        } else {
          clearInterval(interval);
        }
      }, speed);
    }

    function spawnSmoke() {
      const groupRect = raceGroup.getBoundingClientRect();
      const trackRect = trackArea.getBoundingClientRect();
      const smokeX = groupRect.left - trackRect.left;

      particles.forEach((p, i) => {
        p.style.left = (smokeX + Math.random() * 20) + 'px';
        p.style.bottom = (8 + Math.random() * 12) + 'px';
        p.style.width = (6 + Math.random() * 6) + 'px';
        p.style.height = p.style.width;
        p.classList.remove('active');
        void p.offsetWidth;
        setTimeout(() => p.classList.add('active'), i * 120);
      });
    }

    function skipLoader() {
      screen.classList.add('done');
    }

    // === PHASE 1: Car races forward ===
    function phase1() {
      // Driver hidden during race
      driver.style.display = 'none';

      const start = performance.now();

      function animate(now) {
        const t = Math.min((now - start) / PHASE1_DURATION, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        setProgress(eased * STUCK_AT);

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          phase2();
        }
      }
      requestAnimationFrame(animate);
    }

    // === PHASE 2: Engine failure ===
    function phase2() {
      raceGroup.classList.add('stuck');
      spawnSmoke();
      typeStatus('// DNF?', 35);

      setTimeout(() => skipHint.classList.add('visible'), 200);

      setTimeout(() => {
        raceGroup.classList.remove('stuck');
        phase3();
      }, STUCK_DURATION);
    }

    // === PHASE 3: Driver appears and pushes ===
    function phase3() {
      hideStatus();
      skipHint.classList.remove('visible');

      // Show driver (already positioned behind car in HTML)
      driver.style.display = 'block';
      driver.classList.add('visible');

      setTimeout(() => {
        driver.classList.add('pushing');
        typeStatus('// not like this. not today.', 30);

        const start = performance.now();

        function animatePush(now) {
          const t = Math.min((now - start) / PUSH_DURATION, 1);

          let eased;
          if (t < 0.2) {
            eased = 2.5 * t * t;
          } else if (t < 0.8) {
            eased = 0.1 + (t - 0.2) * 1.25;
          } else {
            const remaining = (t - 0.8) / 0.2;
            eased = 0.85 + 0.15 * (1 - Math.pow(1 - remaining, 2));
          }

          const prog = STUCK_AT + (100 - STUCK_AT) * eased;
          setProgress(prog);

          if (t < 1) {
            requestAnimationFrame(animatePush);
          } else {
            finish();
          }
        }

        requestAnimationFrame(animatePush);
      }, ENTRY_DELAY);
    }

    // === PHASE 4: Finish! ===
    function finish() {
      driver.classList.remove('pushing');
      hideStatus();

      setTimeout(() => {
        typeStatus('// welcome to my world.', 25);
      }, 100);

      setTimeout(() => {
        screen.classList.add('done');
      }, EXIT_DELAY + 300);
    }

    // === START ===
    phase1();
  </script>

</body>
</html>
